apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperchess-client
  namespace: hyperchess
  labels:
    app: hyperchess-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hyperchess-client
  template:
    metadata:
      labels:
        app: hyperchess-client
    spec:
      containers:
        - name: hyperchess-client
          image: registry.semanticallyinvalid.net/michaelmcculloch/hyperchess/client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hyperchess-client
  namespace: hyperchess
spec:
  selector:
    app: hyperchess-client
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
