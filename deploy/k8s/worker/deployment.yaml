apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperchess-worker
  namespace: hyperchess
  labels:
    app: hyperchess-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hyperchess-worker
  template:
    metadata:
      labels:
        app: hyperchess-worker
    spec:
      containers:
        - name: hyperchess-worker
          image: registry.semanticallyinvalid.net/michaelmcculloch/hyperchess/worker:latest
          env:
          - name: HYPERCHESS_MINIMAX_DEPTH
            value: "10"
          - name: HYPERCHESS_COMPUTE_MEMORY
            value: "16384"
          - name: HYPERCHESS_COMPUTE_MINUTES
            value: "1"
          - name: HYPERCHESS_COMPUTE_CONCURRENCY
            value: "4"
          - name: HYPERCHESS_API_PORT
            value: "3123"
          - name: HYPERCHESS_DISTRIBUTED_ENABLED
            value: "true"
          - name: HYPERCHESS_MODE
            value: "worker"
          - name: HYPERCHESS_GRPC_PORT
            value: "50051"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
              name: grpc
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {}
---
# Headless service for gRPC worker discovery via DNS
apiVersion: v1
kind: Service
metadata:
  name: hyperchess-workers
  namespace: hyperchess
spec:
  clusterIP: None
  selector:
    app: hyperchess-worker
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
