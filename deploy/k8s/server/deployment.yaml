apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperchess-server
  namespace: hyperchess
  labels:
    app: hyperchess-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hyperchess-server
  template:
    metadata:
      labels:
        app: hyperchess-server
    spec:
      containers:
        - name: hyperchess-server
          image: registry.semanticallyinvalid.net/michaelmcculloch/hyperchess/server:latest
          env:
          - name: HYPERCHESS_MINIMAX_DEPTH
            value: "10"
          - name: HYPERCHESS_COMPUTE_MEMORY
            value: "16384"
          - name: HYPERCHESS_COMPUTE_MINUTES
            value: "1"
          - name: HYPERCHESS_COMPUTE_CONCURRENCY
            value: "4"
          - name: HYPERCHESS_API_PORT
            value: "3123"
          imagePullPolicy: Always
          ports:
            - containerPort: 3123
          readinessProbe:
            tcpSocket:
              port: 3123
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3123
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hyperchess-server
  namespace: hyperchess
spec:
  selector:
    app: hyperchess-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3123
  type: ClusterIP
