apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperchess-gateway
  namespace: hyperchess
  labels:
    app: hyperchess-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hyperchess-gateway
  template:
    metadata:
      labels:
        app: hyperchess-gateway
    spec:
      containers:
        - name: hyperchess-gateway
          image: registry.semanticallyinvalid.net/michaelmcculloch/hyperchess/gateway:latest
          env:
          - name: HYPERCHESS_MINIMAX_DEPTH
            value: "10"
          - name: HYPERCHESS_COMPUTE_MEMORY
            value: "16384"
          - name: HYPERCHESS_COMPUTE_MINUTES
            value: "1"
          - name: HYPERCHESS_COMPUTE_CONCURRENCY
            value: "12"
          - name: HYPERCHESS_API_PORT
            value: "3123"
          - name: HYPERCHESS_DISTRIBUTED_ENABLED
            value: "true"
          - name: HYPERCHESS_MODE
            value: "gateway"
          - name: HYPERCHESS_REDIS_URL
            value: "redis://hyperchess-redis:6379"
          - name: HYPERCHESS_WORKER_DNS
            value: "hyperchess-workers.hyperchess.svc.cluster.local"
          - name: HYPERCHESS_GRPC_PORT
            value: "50051"
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          imagePullPolicy: Always
          ports:
            - containerPort: 3123
              name: http
          readinessProbe:
            tcpSocket:
              port: 3123
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3123
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hyperchess-server
  namespace: hyperchess
spec:
  selector:
    app: hyperchess-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3123
  type: ClusterIP
