syntax = "proto3";

package hyperchess.search;

service SearchWorker {
    // Execute a partial search on a subset of root moves
    rpc SearchMoves (SearchRequest) returns (SearchResponse);

    // Health/readiness check
    rpc Ping (PingRequest) returns (PingResponse);
}

message SearchRequest {
    // Board state (bincode-encoded Board)
    bytes board_data = 1;

    // Which player is searching ("white" or "black")
    string player = 2;

    // The subset of root moves to search (bincode-encoded Vec<Move>)
    bytes moves_data = 3;

    // Search parameters
    uint32 depth = 4;
    uint64 time_limit_ms = 5;
    uint32 memory_mb = 6;
    uint32 num_threads = 7;
}

message SearchResponse {
    // Best move found (bincode-encoded Move)
    bytes best_move = 1;

    // Score of the best move
    int32 score = 2;

    // Number of nodes searched
    uint64 nodes_searched = 3;

    // Whether the search completed or timed out
    bool completed = 4;
}

message PingRequest {}

message PingResponse {
    string pod_name = 1;
    uint32 available_threads = 2;
}
